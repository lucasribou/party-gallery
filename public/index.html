<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

<h1 class="logo">✨ PARTY GALLERY</h1>

<p class="subtitle">Scannez le QR Code pour participer</p>

<input id="nameInput" placeholder="Entrez votre prénom">

<div class="camera-container">
<video id="video" autoplay playsinline></video>
</div>

<button id="captureBtn" class="capture-btn">📸 PRENDRE UNE PHOTO</button>

</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="modal hidden">
<div class="modal-card">
<div class="check">✔</div>
<h2>Photo envoyée !</h2>
<p>Merci pour votre participation 🎉</p>

<div class="modal-buttons">
<button onclick="takeAnother()">📸 En reprendre une</button>
<button onclick="closeModal()">🚪 Quitter</button>
</div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
