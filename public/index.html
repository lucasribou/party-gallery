<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Party Gallery</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="container">

<h1 class="title">📸 Party Gallery</h1>

<input id="nameInput" placeholder="Votre prénom">

<div class="camera">

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

</div>

<button id="captureBtn">Prendre la photo</button>

</div>

<div id="successScreen" class="hidden">

<div class="card">

<div class="check">✔</div>

<h2>Photo envoyée !</h2>

<p>Merci pour votre participation</p>

<button onclick="restart()">📸 En reprendre une</button>

<button onclick="leave()">Quitter</button>

</div>

</div>

<script src="/confetti.js"></script>
<script src="/script.js"></script>

</body>
</html>
