<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Event</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">
<div class="center-box">
  <h1>PRIVATE EVENT</h1>
  <input id="prenom" placeholder="Votre prénom">
  <button onclick="login()">ENTRER</button>
</div>

<script>
function login(){
  const prenom = document.getElementById("prenom").value.trim();
  if(!prenom) return;

  localStorage.setItem("prenom", prenom);

  if(prenom.toLowerCase() === "lucas"){
    const code = prompt("Code requis :");
    if(code === "200910"){
      window.location = "choose.html";
    } else {
      alert("Code incorrect");
    }
  } else {
    window.location = "photos.html";
  }
}
</script>
<div id="successScreen" class="success-screen hidden">
  <div class="success-card">

    <div class="checkmark">✔</div>

    <h2>Photo envoyée !</h2>

    <p>Merci pour votre participation 📸</p>

    <div class="buttons">
      <button onclick="restartCamera()">📸 En prendre une autre</button>
      <button onclick="goHome()">🚪 Quitter</button>
    </div>

  </div>
</div>
</body>
</html>
